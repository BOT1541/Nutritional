<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriCritical — Нутритивная поддержка в ОРИТ</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0F19;--card:#131825;--card2:#1A2035;--border:#1E2A45;--text:#E2E8F0;--muted:#64748B;--accent:#6366F1;--accent2:#818CF8;--green:#10B981;--red:#EF4444;--yellow:#F59E0B;--cyan:#06B6D4;--purple:#A78BFA;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.header{background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 50%,#312E81 100%);padding:20px 24px;border-bottom:2px solid var(--accent)}
.header h1{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.header h1 span{font-size:11px;font-weight:500;background:rgba(99,102,241,0.2);color:var(--accent2);padding:2px 10px;border-radius:20px;margin-left:8px;vertical-align:middle}
.header p{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.nav{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{height:0}
.nav button{background:none;border:none;color:var(--muted);padding:12px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;transition:all .15s}
.nav button:hover{color:var(--text)}
.nav button.active{color:var(--accent2);border-bottom-color:var(--accent);background:rgba(99,102,241,0.06)}
.main{max-width:960px;margin:0 auto;padding:16px 12px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.card-accent{border-top:3px solid var(--accent)}
.card-body{padding:16px 20px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent2);margin-bottom:12px}
.hdr{background:linear-gradient(135deg,#1E1B4B,#312E81);border-radius:14px;padding:20px 24px;margin-bottom:16px}
.hdr h2{font-size:20px;font-weight:700}
.hdr p{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px}
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}.grid-auto{grid-template-columns:1fr 1fr}}
label.field{display:flex;flex-direction:column;gap:4px}
label.field span{font-size:11px;color:var(--muted);font-weight:500}
input[type="number"],select{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;font-family:var(--mono);outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.metric{text-align:center;padding:12px}
.metric .val{font-size:24px;font-weight:800;font-family:var(--mono)}
.metric .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.gauge{height:6px;border-radius:3px;background:#1E293B;position:relative;margin-top:10px;overflow:hidden}
.gauge-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .3s}
.alert{border-radius:10px;padding:10px 14px;display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.5;margin-bottom:6px}
.alert-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5}
.alert-warning{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);color:#FDE68A}
.alert-info{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);color:#C7D2FE}
.tactic{font-size:12.5px;color:var(--text);line-height:1.6;padding-left:16px;position:relative;margin-bottom:3px}
.tactic::before{content:'→';position:absolute;left:0;color:var(--accent2)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:none;border:2px solid var(--border);color:var(--muted)}
.btn-outline.active{border-color:var(--accent);color:var(--accent2);background:rgba(99,102,241,0.08)}
.btn-ghost{background:none;border:2px dashed var(--border);color:var(--muted);width:100%;padding:10px}
.btn-yes,.btn-no{padding:8px 20px;border-radius:8px;border:2px solid var(--border);background:var(--card2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.btn-yes.sel{border-color:var(--green);color:var(--green);background:rgba(16,185,129,0.08)}
.btn-no.sel{border-color:var(--red);color:var(--red);background:rgba(239,68,68,0.08)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--card2);color:var(--muted);padding:8px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
td{padding:6px;border-bottom:1px solid var(--border)}
td input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:4px 6px;font-family:var(--mono);font-size:12px;text-align:center}
.mix-card{padding:12px 16px}
.mix-card h4{font-size:14px;font-weight:700}
.mix-card .brand{font-size:11px;color:var(--muted);margin-left:8px}
.mix-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0}
.mix-stat{text-align:center}
.mix-stat .v{font-size:16px;font-weight:700;font-family:var(--mono)}
.mix-stat .l{font-size:9px;color:var(--muted)}
.indication{font-size:12px;color:var(--muted);background:var(--card2);border-radius:6px;padding:4px 8px}
.compl-card{padding:16px}
.compl-card h4{font-size:14px;font-weight:700;margin-bottom:10px}
.step{font-size:12.5px;color:var(--text);line-height:1.7;padding-left:20px;position:relative}
.step .num{position:absolute;left:0;font-weight:700;font-family:var(--mono)}
.matrix-table{font-size:10px;overflow-x:auto}
.matrix-table table{min-width:600px}
.matrix-table th{padding:6px 4px;min-width:70px}
.matrix-table td{padding:6px 4px;text-align:center;white-space:pre-line;line-height:1.4}
.matrix-opt{background:rgba(16,185,129,0.12)}
.matrix-warn{background:rgba(245,158,11,0.1)}
.matrix-danger{background:rgba(239,68,68,0.15);color:#FCA5A5;font-weight:700}
.footer{background:var(--card);border-top:1px solid var(--border);padding:14px 20px;text-align:center}
.footer p{font-size:10px;color:var(--muted);font-family:var(--mono)}
.link-bar{background:var(--card2);border-bottom:1px solid var(--border);padding:8px 20px;text-align:center}
.link-bar a{color:var(--accent2);font-size:12px;text-decoration:none;font-weight:500}
.link-bar a:hover{text-decoration:underline}
.hidden{display:none}
.chip{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:none;font-weight:500;margin:2px}
.chip.on{background:var(--accent);color:#fff}
.chip.off{background:var(--card2);color:var(--muted)}
.rec-box{border-radius:10px;padding:14px}
.rec-green{background:rgba(16,185,129,0.1)}
.rec-purple{background:rgba(139,92,246,0.1)}
.rec-yellow{background:rgba(245,158,11,0.1)}
.rec-blue{background:rgba(59,130,246,0.1)}
.rec-pink{background:rgba(168,85,247,0.1)}
.checkbox-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.checkbox-row label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent)}
</style>
</head>

/* ═══════ STATE ═══════ */

};

function idW(s,h){return s==="m"?50+0.91*(h-152.4):45.5+0.91*(h-152.4)}
function adjWt(a,i){return i+0.25*(a-i)}
function bmiCalc(w,h){return w/((h/100)**2)}
function hbCalc(s,w,h,a){return s==="m"?88.362+13.397*w+4.799*h-5.677*a:447.593+9.247*w+3.098*h-4.330*a}

function getRec(mi,rq,wt,lac,day){
  let e,p,cf,sub,eM,pM,mod,al=[],ta=[];const ebb=day<=2;
  if(ebb){al.push({t:"info",x:"Сутки "+day+" — ebb-фаза. Трофическое ≤70% REE."});ta.push("Ebb: ≤70% REE, белок сразу")}
  if(mi<0.9){e={f:ebb?.5:1,n:ebb?"50% REE":"100% REE",k:"15–25"};ta.push("Трофическое 10–20мл/ч")}
  else if(mi<=1.1){e={f:ebb?.7:1,n:ebb?"70% REE":"100% REE",k:"25–30"}}
  else if(mi<=1.3){e={f:ebb?.7:1,n:ebb?"70% REE":"100% REE (не выше!)",k:"25–30"};al.push({t:"warning",x:"Гиперметаб.: контроль overfeeding!"})}
  else{e={f:ebb?.5:.75,n:ebb?"50% REE":"70–80% REE!",k:"15–20"};al.push({t:"danger",x:"Выраж. гипермет.! Max "+(ebb?"50":"70–80")+"% REE!"})}
  if(mi<0.9)p=rq<.75?{min:1.3,max:1.5,n:"Катаб.+гипо"}:{min:1.0,max:1.3,n:"Стандарт"};
  else if(mi<=1.1)p=rq<.75?{min:1.5,max:1.8,n:"Катаболизм"}:{min:1.2,max:1.5,n:"Стандарт"};
  else if(mi<=1.3)p=rq<.75?{min:1.8,max:2.2,n:"Гипер+катаб."}:{min:1.5,max:1.8,n:"Гиперметаб."};
  else p=rq<.75?{min:2.0,max:2.5,n:"Тяж. катаб."}:{min:1.8,max:2.0,n:"Выраж. гипермет."};
  if(rq<.70){cf="30:70";sub="Кетогенез";eM="Суппортан";pM="Липофундин";mod="МСТ, Омегавен";al.push({t:"warning",x:"RQ<0.70: кетогенез!"})}
  else if(rq<.75){cf="35:65";sub="Окисл. жиров";eM="Суппортан";pM="Кабивен";mod="МСТ, Протеин"}
  else if(rq<.82){cf="40:60";sub="Смешанное(Л)";eM="Нутризон Стандарт";pM="Оликлиномель N4";mod="Протеин по потребности"}
  else if(rq<.87){cf="50:50";sub="Оптимум";eM="Нутризон Стандарт";pM="Оликлиномель N4";mod="По потребности"}
  else if(rq<.95){cf="40:60";sub="Акцент углев.";eM="Диазон";pM="Оликлиномель N7";mod="МСТ";al.push({t:"warning",x:"RQ→1.0!"})}
  else if(rq<=1.0){cf="30:70";sub="Углеводы!";eM="Диазон";pM="СМОФКабивен";mod="Убрать глюкозу!";al.push({t:"danger",x:"Высокий RQ!"})}
  else{cf="20:80";sub="ЛИПОГЕНЕЗ!";eM="↓ЭП";pM="СТОП ПП!";mod="Только Омегавен";al.push({t:"danger",x:"RQ>1.0 — ЛИПОГЕНЕЗ!"})}
  if(lac>4){al.push({t:"danger",x:"Лактат "+lac+" — гипоксия!"});ta.push("Приоритет: гемодинамика!")}
  else if(lac>2)al.push({t:"warning",x:"Лактат "+lac+" — контроль волемии."});
  return {e,p,cf,sub,eM,pM,mod,al,ta};
}

/* ═══════ RENDER ENGINE ═══════ */
function h(tag,attrs,children){
  if(typeof attrs==='string')return `<${tag}>${attrs}</${tag}>`;
  let a=Object.entries(attrs||{}).map(([k,v])=>`${k}="${v}"`).join(' ');
  let c=Array.isArray(children)?children.join(''):children||'';
  return `<${tag} ${a}>${c}</${tag}>`;
}

function render(){
  const nav=document.getElementById('nav');
  nav.innerHTML=TABS.map(t=>`<button class="${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';render()">${t.l}</button>`).join('');
  const app=document.getElementById('app');

}
function sel(label,key,options){

function rCalculator(){
  const hbv=hbCalc(S.sex,S.wt,S.ht,S.age),mf=S.sex==="m"?10*S.wt+6.25*S.ht-5*S.age+5:10*S.wt+6.25*S.ht-5*S.age-161;

  const fm=[{n:"Harris-Benedict",v:Math.round(hbv),d:"Классическая (1919)"},{n:"Mifflin-St Jeor",v:Math.round(mf),d:"Современная (1990)"},{n:"Penn State",v:ps,d:`ИВЛ (Tmax=${S.tmax}, Ve=${S.ve})`},{n:"25 ккал/кг",v:Math.round(S.aw*25),d:"ESPEN нижняя"},{n:"30 ккал/кг",v:Math.round(S.aw*30),d:"ESPEN верхняя"}];

function rRefeeding(){
  const major=[S.rfBmi<16,S.rfLoss>15,S.rfStarve>10].filter(Boolean).length;
  const minor=[S.rfBmi<18.5&&S.rfBmi>=16,S.rfLoss>10&&S.rfLoss<=15,S.rfStarve>5&&S.rfStarve<=10,S.rfAlc,S.rfChemo].filter(Boolean).length;
  const elLow=[S.rfK,S.rfMg,S.rfPo].filter(Boolean).length;
  const risk=major>0?"high":minor>=2||elLow>0?"high":minor===1?"moderate":"low";
  const rc=risk==="high"?"#EF4444":risk==="moderate"?"#F59E0B":"#10B981";
  const rl=risk==="high"?"ВЫСОКИЙ":risk==="moderate"?"УМЕРЕННЫЙ":"НИЗКИЙ";
  const txt=risk==="high"?"Тиамин 200–300мг в/в ДО питания! Старт 10ккал/кг, K/Mg/PO₄ каждые 6–12ч.":risk==="moderate"?"Старт 15–20ккал/кг. Контроль электролитов ежедневно. Тиамин 100мг.":"Стандартный протокол наращивания ЭП.";
  return `<div class="hdr" style="background:linear-gradient(135deg,#991B1B,#7F1D1D)"><h2>🛡️ Скрининг Refeeding Syndrome</h2><p>Критерии NICE (2006, обновл. 2017)</p></div>

    </div>

      <label><input type="checkbox" ${S.rfK?'checked':''} onchange="S.rfK=this.checked;render()">K⁺ ↓</label>
      <label><input type="checkbox" ${S.rfMg?'checked':''} onchange="S.rfMg=this.checked;render()">Mg²⁺ ↓</label>
      <label><input type="checkbox" ${S.rfPo?'checked':''} onchange="S.rfPo=this.checked;render()">PO₄ ↓</label>
      <label><input type="checkbox" ${S.rfAlc?'checked':''} onchange="S.rfAlc=this.checked;render()">Алкоголь</label>
      <label><input type="checkbox" ${S.rfChemo?'checked':''} onchange="S.rfChemo=this.checked;render()">Химиотерапия</label>
    </div></div>
    <div class="card card-body" style="border-top:3px solid ${rc}">
      <div class="lbl">Риск Refeeding Syndrome</div>
      <div style="font-size:28px;font-weight:800;color:${rc}">${rl}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6">${txt}</div>
    </div>`;
}

function rMixtures(){
  const cats=[{id:"enteral",l:"ЭП ("+ENT.length+")"},{id:"parenteral",l:"ПП ("+PAR.length+")"},{id:"modular",l:"Модуль. ("+MODD.length+")"}];
  const types=["all",...new Set(ENT.map(m=>m.t))];
  let items='';
  if(S.mixCat==="enteral"){
    const data=S.mixFil==="all"?ENT:ENT.filter(m=>m.t===S.mixFil);
    items=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">${types.map(t=>`<button class="chip ${S.mixFil===t?'on':'off'}" onclick="S.mixFil='${t}';render()">${t==='all'?'Все':t}</button>`).join('')}</div>`+data.map(m=>`<div class="card mix-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><span style="font-weight:700">${m.n}</span><span class="brand">${m.b}</span></div><span class="tag" style="background:var(--cyan)22;color:var(--cyan)">${m.t}</span></div><div class="mix-stats">${[{l:"ккал/мл",v:m.k},{l:"белок",v:m.p},{l:"жиры",v:m.f},{l:"углев.",v:m.c},{l:"мОсм",v:m.o}].map(x=>`<div class="mix-stat"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('')}</div><div class="indication">${m.i}</div></div>`).join('');
  } else if(S.mixCat==="parenteral"){
    items=PAR.map(m=>`<div class="card mix-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><span style="font-weight:700">${m.n}</span><span class="brand">${m.b}</span></div><span class="tag" style="background:var(--purple)22;color:var(--purple)">ПП</span></div><div class="mix-stats" style="grid-template-columns:repeat(4,1fr)">${[{l:"мл",v:m.v},{l:"ккал",v:m.k},{l:"белок",v:m.p},{l:"мОсм",v:m.o}].map(x=>`<div class="mix-stat"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('')}</div><div style="font-size:11.5px"><b>АК:</b> ${m.aa} · <b>Липиды:</b> ${m.lip} · <b>Глюкоза:</b> ${m.gl}</div><div class="indication" style="margin-top:6px">${m.i}</div></div>`).join('');
  } else {
    items=MODD.map(m=>`<div class="card mix-card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><span style="font-weight:700">${m.n}</span><span class="brand">${m.b}</span></div><span class="tag" style="background:var(--green)22;color:var(--green)">${m.tp}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px"><div><span style="font-size:11px;color:var(--muted)">Состав: </span><span style="font-weight:500">${m.ct}</span></div><div><span style="font-size:11px;color:var(--muted)">Ккал: </span><span style="font-weight:700;font-family:var(--mono)">${m.k}</span></div></div><div class="indication">${m.i}</div><div style="font-size:11.5px;color:var(--green);margin-top:4px;font-weight:500">Дозировка: ${m.d}</div></div>`).join('');
  }
  return `<div class="hdr" style="background:linear-gradient(135deg,#0369A1,#0C4A6E)"><h2>🧪 Смеси и растворы</h2><p>${ENT.length} ЭП + ${PAR.length} ПП + ${MODD.length} модульных</p></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">${cats.map(c=>`<button class="btn ${S.mixCat===c.id?'btn-outline active':'btn-outline'}" onclick="S.mixCat='${c.id}';S.mixFil='all';render()" style="flex:1">${c.l}</button>`).join('')}</div>${items}`;
}

function rMonitoring(){
  const d=S.monDays;
  const nBal=(pr,urea)=>{const nIn=pr/6.25;const nOut=urea*0.466+4;return Math.round((nIn-nOut)*10)/10};
  return `<div class="hdr" style="background:linear-gradient(135deg,#B45309,#78350F)"><h2>📊 Мониторинг</h2><p>REE, RQ, покрытие, азотистый баланс</p></div>
    <div class="card" style="overflow-x:auto"><table><thead><tr>${["Д","REE","RQ","Дост.","Белок","Моч.","N-бал","%","Прим."].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${d.map((r,i)=>{const pct=Math.round((r.del/r.ree)*100);const pc=pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)';const nb=nBal(r.pr,r.urea);const nc=nb>=0?'var(--green)':'var(--red)';
    return `<tr><td style="text-align:center;font-weight:700;font-family:var(--mono)">${r.d}</td>
    <td><input type="number" value="${r.ree}" onchange="S.monDays[${i}].ree=+this.value;render()"></td>
    <td><input type="number" value="${r.rq}" step="0.01" onchange="S.monDays[${i}].rq=+this.value;render()"></td>
    <td><input type="number" value="${r.del}" onchange="S.monDays[${i}].del=+this.value;render()"></td>
    <td><input type="number" value="${r.pr}" onchange="S.monDays[${i}].pr=+this.value;render()"></td>
    <td><input type="number" value="${r.urea}" onchange="S.monDays[${i}].urea=+this.value;render()"></td>
    <td style="text-align:center"><span style="color:${nc};font-weight:700;font-family:var(--mono)">${nb>0?'+':''}${nb}</span></td>
    <td style="text-align:center"><span style="color:${pc};font-weight:700">${pct}%</span></td>
    <td><input type="text" value="${r.no}" onchange="S.monDays[${i}].no=this.value;render()"></td></tr>`}).join('')}</tbody></table></div>
    <button class="btn-ghost" onclick="const l=S.monDays[S.monDays.length-1];S.monDays.push({d:l.d+1,ree:l.ree,rq:l.rq,del:l.del,pr:l.pr,urea:l.urea,no:''});render()">+ Добавить день</button>
    <div class="grid grid-4" style="margin-top:12px">
      ${metric("Ср.REE",Math.round(d.reduce((s,r)=>s+r.ree,0)/d.length),"var(--accent)")}
      ${metric("Ср.RQ",(d.reduce((s,r)=>s+r.rq,0)/d.length).toFixed(2),"var(--purple)")}
      ${metric("Покрытие",Math.round(d.reduce((s,r)=>s+(r.del/r.ree)*100,0)/d.length)+"%","var(--green)")}
      ${metric("Ср.N-бал",(d.reduce((s,r)=>s+nBal(r.pr,r.urea),0)/d.length).toFixed(1),"var(--yellow)")}
    </div>
    <div class="card card-body" style="margin-top:8px"><div style="font-size:12px;color:var(--muted);line-height:1.6"><b>N-баланс</b> = N_in(белок/6.25) − N_out(мочевина×0.466+4). Цель: +2…+4 г/сут.</div></div>`;
}

function rComplications(){
  const ep=[{n:"Высокий ост. объём",s:"warning",a:["↓ скорость на 50%","Прокинетики","Головной конец 30–45°","48ч → постпилорический доступ"]},
    {n:"Диарея",s:"warning",a:["Исключить C.difficile!","↓ скорость","Пептамен / с клетчаткой","Не прекращать ЭП!"]},
    {n:"Аспирация",s:"danger",a:["СТОП ЭП","Санация ТБД","Головной конец 45°","Постпилорический зонд"]},
    {n:"Гипергликемия",s:"warning",a:["Диазон","Инсулин: 6–10 ммоль/л","↓ глюкозу в/в"]},
    {n:"Refeeding",s:"danger",a:["↓↓ калорийность","K,Mg,PO₄ каждые 6–12ч","Тиамин 200–300мг в/в!","10ккал/кг → +33%/сут"]}];
  const pp=[{n:"Катетерная инфекция",s:"danger",a:["Посев крови","Эмпирическая АБТ","Рассмотреть удаление катетера"]},
    {n:"Гипертриглицеридемия",s:"warning",a:["↓ скорость липидов",">12 → СТОП липиды","СМОФлипид"]},
    {n:"Холестаз",s:"warning",a:["↓ липиды до 1 г/кг","СМОФлипид/Омегавен","Циклическое ПП"]},
    {n:"Гипергликемия на ПП",s:"warning",a:["↓ глюкозу (max 4–5 г/кг/сут)","Инсулин в/в"]},
    {n:"Перегрузка жидкостью",s:"warning",a:["Концентрированные р-ры","↑ ЭП, ↓ ПП"]}];
  const data=S.complView==="ep"?ep:pp;
  return `<div class="hdr" style="background:linear-gradient(135deg,#991B1B,#7F1D1D)"><h2>⚠️ Осложнения НП</h2><p>Алгоритмы действий</p></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">${[{id:"ep",l:"Осложнения ЭП"},{id:"pp",l:"Осложнения ПП"}].map(c=>`<button class="btn ${S.complView===c.id?'btn-outline active':'btn-outline'}" onclick="S.complView='${c.id}';render()" style="flex:1">${c.l}</button>`).join('')}</div>
    ${data.map(c=>`<div class="card compl-card" style="border-top:3px solid ${c.s==='danger'?'var(--red)':'var(--yellow)'}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h4>${c.n}</h4><span class="tag" style="background:${c.s==='danger'?'var(--red)':'var(--yellow)'}22;color:${c.s==='danger'?'var(--red)':'var(--yellow)'}">${c.s==='danger'?'Критическое':'Внимание'}</span></div>${c.a.map((a,j)=>`<div class="step"><span class="num" style="color:${c.s==='danger'?'var(--red)':'var(--yellow)'}">${j+1}.</span>${a}</div>`).join('')}</div>`).join('')}`;
}

function rReference(){
  const sec=[
    {t:"RQ",it:[{l:"<0.70",d:"Кетогенез"},{l:"0.70–0.85",d:"Смешанное (норма)"},{l:"0.85–1.0",d:"Углеводы"},{l:">1.0",d:"Липогенез!"}]},
    {t:"MI",it:[{l:"<0.9",d:"Гипометаболизм"},{l:"0.9–1.1",d:"Нормо"},{l:"1.1–1.3",d:"Гипер"},{l:">1.3",d:"Выраж.гипер"}]},
    {t:"Лактат",it:[{l:"<2",d:"Норма"},{l:"2–4",d:"Гипоперфузия"},{l:">4",d:"Тяжёлая гипоксия!"}]},
    {t:"Фазы",it:[{l:"Ebb (0–48ч)",d:"Гипометаб., трофич. ЭП ≤70% REE"},{l:"Flow (>48ч)",d:"Гиперметаб., до 100% REE"}]},
    {t:"ИМТ-коррекция",it:[{l:"ИМТ<30",d:"По фактическому весу"},{l:"ИМТ 30–50",d:"Энергия по скорр., белок по идеальному"},{l:"ИМТ>50",d:"По идеальному весу"}]},
    {t:"N-баланс",it:[{l:"Формула",d:"N_in − N_out(моч×0.466+4)"},{l:"Цель",d:"+2…+4 г/сут"},{l:"Отрицат.",d:"↑ белковую дотацию"}]},
    {t:"ESPEN/ASPEN",it:[{l:"ЭП",d:"24–48ч, старт"},{l:"Белок",d:"≥1.3 г/кг"},{l:"ПП",d:"Не ранее 3–7 дня"},{l:"Глутамин",d:"0.3–0.5г/кг (не при ПОН!)"},{l:"ω-3",d:"При ОРДС, сепсисе"}]},
    {t:"Источники",it:[{l:"ESPEN 2019",d:"Singer et al. Clin Nutr"},{l:"ESPEN 2023",d:"Update"},{l:"ASPEN 2022",d:"Compher et al. JPEN"},{l:"EFFORT",d:"Heyland, Lancet 2023"},{l:"NICE 2006",d:"Refeeding guidelines"}]}
  ];
  return `<div class="hdr" style="background:linear-gradient(135deg,#4338CA,#312E81)"><h2>📖 Справочник</h2><p>Ключевые данные</p></div>
    ${sec.map(s=>`<div class="card card-body"><div style="font-size:13px;font-weight:700;margin-bottom:8px">${s.t}</div>${s.it.map((x,i)=>`<div style="display:flex;gap:12px;padding:6px 0;${i<s.it.length-1?'border-bottom:1px solid var(--border)':''}"><div style="font-weight:700;color:var(--accent2);min-width:80px;font-size:12.5px;font-family:var(--mono)">${x.l}</div><div style="font-size:12.5px;color:var(--muted)">${x.d}</div></div>`).join('')}</div>`).join('')}`;
}

render();
</script>
</body>
