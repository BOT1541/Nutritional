<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F0F4FF;
  --card:#FFFFFF;
  --card2:#F8FAFF;
  --border:#E2E8F8;
  --text:#1E293B;
  --muted:#64748B;
  --accent:#6366F1;
  --accent2:#4F46E5;
  --green:#059669;
  --green-bg:#ECFDF5;
  --red:#DC2626;
  --red-bg:#FEF2F2;
  --yellow:#D97706;
  --yellow-bg:#FFFBEB;
  --cyan:#0891B2;
  --cyan-bg:#ECFEFF;
  --purple:#7C3AED;
  --purple-bg:#F5F3FF;
  --font:'Nunito',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --shadow:0 2px 12px rgba(99,102,241,0.10);
  --shadow-lg:0 8px 32px rgba(99,102,241,0.15);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.header{background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 50%,#06B6D4 100%);padding:20px 24px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:rgba(255,255,255,0.08);border-radius:50%}
.header::after{content:'';position:absolute;bottom:-30px;left:30%;width:150px;height:150px;background:rgba(255,255,255,0.05);border-radius:50%}
.header h1{font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.5px;position:relative}
.header h1 span{font-size:12px;font-weight:700;background:rgba(255,255,255,0.25);color:#fff;padding:3px 10px;border-radius:20px;margin-left:10px;vertical-align:middle}
.header p{font-size:12px;color:rgba(255,255,255,0.8);margin-top:5px;position:relative}

/* NAV */
.nav{background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:50;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;box-shadow:0 2px 8px rgba(99,102,241,0.08)}
.nav::-webkit-scrollbar{height:0}
.nav button{background:none;border:none;color:var(--muted);padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);border-bottom:3px solid transparent;transition:all .2s}
.nav button:hover{color:var(--accent);background:rgba(99,102,241,0.04)}
.nav button.active{color:var(--accent2);border-bottom-color:var(--accent);background:rgba(99,102,241,0.06)}

/* LAYOUT */
.main{max-width:960px;margin:0 auto;padding:16px 12px 60px}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.card-accent{border-top:4px solid var(--accent)}
.card-body{padding:16px 20px}
.section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px}

/* HEADER BLOCK */
.hdr{border-radius:16px;padding:20px 24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.hdr::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,0.1);border-radius:50%}
.hdr h2{font-size:22px;font-weight:900;position:relative}
.hdr p{font-size:12px;color:rgba(255,255,255,0.75);margin-top:4px;position:relative}

/* GRID */
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr}.grid-auto{grid-template-columns:1fr 1fr}}

/* INPUTS */
label.field{display:flex;flex-direction:column;gap:5px}
label.field span{font-size:11px;color:var(--muted);font-weight:700}
input[type="number"],select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid var(--border);background:var(--card2);color:var(--text);font-size:14px;font-family:var(--mono);outline:none;transition:border-color .15s;font-weight:600}
input:focus,select:focus{border-color:var(--accent);background:#fff}

/* TAGS */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}

/* METRIC */
.metric{text-align:center;padding:14px 10px;border-radius:14px}
.metric .val{font-size:26px;font-weight:900;font-family:var(--mono);line-height:1}
.metric .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:700}

/* GAUGE */
.gauge{height:8px;border-radius:4px;background:var(--border);position:relative;margin-top:10px;overflow:hidden}
.gauge-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;transition:width .3s}

/* ALERTS */
.alert{border-radius:12px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5;margin-bottom:8px;font-weight:600}
.alert-danger{background:var(--red-bg);border:2px solid #FECACA;color:#991B1B}
.alert-warning{background:var(--yellow-bg);border:2px solid #FDE68A;color:#92400E}
.alert-info{background:#EEF2FF;border:2px solid #C7D2FE;color:#3730A3}

/* TACTIC */
.tactic{font-size:13px;color:var(--text);line-height:1.6;padding-left:18px;position:relative;margin-bottom:4px;font-weight:600}
.tactic::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:900}

/* BUTTONS — крупные */
.btn{padding:12px 22px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:800;font-family:var(--font);transition:all .2s;letter-spacing:0.2px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(99,102,241,0.4)}
.btn-outline{background:#fff;border:2px solid var(--border);color:var(--muted);padding:12px 20px}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-outline.active{border-color:var(--accent);color:var(--accent2);background:#EEF2FF}
.btn-ghost{background:var(--card2);border:2px dashed var(--border);color:var(--muted);width:100%;padding:12px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--font);transition:all .2s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:#EEF2FF}
.btn-yes,.btn-no{padding:12px 28px;border-radius:12px;border:2px solid var(--border);background:var(--card2);color:var(--muted);font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-yes:hover{border-color:var(--green);color:var(--green)}
.btn-no:hover{border-color:var(--red);color:var(--red)}
.btn-yes.sel{border-color:var(--green);color:#fff;background:linear-gradient(135deg,#059669,#10B981);box-shadow:0 4px 12px rgba(5,150,105,0.3)}
.btn-no.sel{border-color:var(--red);color:#fff;background:linear-gradient(135deg,#DC2626,#EF4444);box-shadow:0 4px 12px rgba(220,38,38,0.3)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);color:var(--muted);padding:10px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px;border-bottom:1px solid var(--border)}
td input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:5px 8px;font-family:var(--mono);font-size:12px;text-align:center;font-weight:600}

/* MIX CARD */
.mix-card{padding:14px 18px}
.mix-card h4{font-size:14px;font-weight:800}
.mix-card .brand{font-size:11px;color:var(--muted);margin-left:8px;font-weight:600}
.mix-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}
.mix-stat{text-align:center;background:var(--bg);border-radius:10px;padding:6px 4px}
.mix-stat .v{font-size:16px;font-weight:800;font-family:var(--mono);color:var(--text)}
.mix-stat .l{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}
.indication{font-size:12px;color:var(--muted);background:var(--bg);border-radius:8px;padding:6px 10px;font-weight:600}

/* COMPL CARD */
.compl-card{padding:18px}
.compl-card h4{font-size:15px;font-weight:800;margin-bottom:10px}
.step{font-size:13px;color:var(--text);line-height:1.7;padding-left:22px;position:relative;font-weight:600}
.step .num{position:absolute;left:0;font-weight:800;font-family:var(--mono)}

/* REC BOXES */
.rec-box{border-radius:14px;padding:16px;border:1.5px solid transparent}
.rec-green{background:var(--green-bg);border-color:#BBF7D0}
.rec-purple{background:var(--purple-bg);border-color:#DDD6FE}
.rec-yellow{background:var(--yellow-bg);border-color:#FDE68A}
.rec-blue{background:var(--cyan-bg);border-color:#BAE6FD}
.rec-pink{background:#FDF4FF;border-color:#E9D5FF}

/* CHIPS */
.chip{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:2px solid transparent;font-weight:700;margin:3px;transition:all .15s}
.chip.on{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;box-shadow:0 3px 8px rgba(99,102,241,0.3)}
.chip.off{background:var(--card2);color:var(--muted);border-color:var(--border)}
.chip.off:hover{border-color:var(--accent);color:var(--accent)}

/* CHECKBOX */
.checkbox-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.checkbox-row label{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;font-weight:700;background:var(--card2);padding:8px 14px;border-radius:10px;border:2px solid var(--border);transition:all .15s}
.checkbox-row label:hover{border-color:var(--accent);background:#EEF2FF}
.checkbox-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent)}

/* FOOTER */
.footer{background:#fff;border-top:2px solid var(--border);padding:16px 20px;text-align:center}
.footer p{font-size:11px;color:var(--muted);font-family:var(--mono)}
.link-bar{background:linear-gradient(135deg,#EEF2FF,#F5F3FF);border-bottom:2px solid var(--border);padding:8px 20px;text-align:center}
.link-bar a{color:var(--accent2);font-size:13px;text-decoration:none;font-weight:800}
.link-bar a:hover{text-decoration:underline}
.hidden{display:none}

/* MATRIX TABLE */
.matrix-table{font-size:10px;overflow-x:auto}
.matrix-table table{min-width:600px}
.matrix-table th{padding:8px 4px;min-width:70px}
.matrix-table td{padding:8px 4px;text-align:center;white-space:pre-line;line-height:1.4;font-weight:600}
.matrix-opt{background:#D1FAE5;color:#065F46;font-weight:800}
.matrix-warn{background:#FEF3C7;color:#92400E}
.matrix-danger{background:#FEE2E2;color:#991B1B;font-weight:800}
</style>
</head>

  else if(mi<=1.3)p=rq<.75?{min:1.8,max:2.2,n:"Гипер+катаб."}:{min:1.5,max:1.8,n:"Гиперметаб."};
  else p=rq<.75?{min:2.0,max:2.5,n:"Тяж. катаб."}:{min:1.8,max:2.0,n:"Выраж. гипермет."};
  if(rq<.70){cf="30:70";sub="Кетогенез";eM="Суппортан";pM="Липофундин";mod="МСТ, Омегавен";al.push({t:"warning",x:"RQ<0.70: кетогенез!"})}
  else if(rq<.75){cf="35:65";sub="Окисл. жиров";eM="Суппортан";pM="Кабивен";mod="МСТ, Протеин"}
  else if(rq<.82){cf="40:60";sub="Смешанное(Л)";eM="Нутризон Стандарт";pM="Оликлиномель N4";mod="Протеин по потребности"}
  else if(rq<.87){cf="50:50";sub="Оптимум";eM="Нутризон Стандарт";pM="Оликлиномель N4";mod="По потребности"}
  else if(rq<.95){cf="40:60";sub="Акцент углев.";eM="Диазон";pM="Оликлиномель N7";mod="МСТ";al.push({t:"warning",x:"RQ→1.0!"})}
  else if(rq<=1.0){cf="30:70";sub="Углеводы!";eM="Диазон";pM="СМОФКабивен";mod="Убрать глюкозу!";al.push({t:"danger",x:"Высокий RQ!"})}
  else{cf="20:80";sub="ЛИПОГЕНЕЗ!";eM="↓ЭП";pM="СТОП ПП!";mod="Только Омегавен";al.push({t:"danger",x:"RQ>1.0 — ЛИПОГЕНЕЗ!"})}
  if(lac>4){al.push({t:"danger",x:"Лактат "+lac+" — гипоксия!"});ta.push("Приоритет: гемодинамика!")}
  else if(lac>2)al.push({t:"warning",x:"Лактат "+lac+" — контроль волемии."});
  return {e,p,cf,sub,eM,pM,mod,al,ta};
}

  if(S.mixCat==="enteral"){
    const data=S.mixFil==="all"?ENT:ENT.filter(m=>m.t===S.mixFil);
    items=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">${types.map(t=>`<button class="chip ${S.mixFil===t?'on':'off'}" onclick="S.mixFil='${t}';render()">${t==='all'?'🔍 Все':t}</button>`).join('')}</div>`+data.map(m=>`<div class="card mix-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><span style="font-weight:800;font-size:14px">${m.n}</span><span class="brand">${m.b}</span></div><span class="tag" style="background:#ECFEFF;color:var(--cyan)">${m.t}</span></div><div class="mix-stats">${[{l:"ккал/мл",v:m.k},{l:"белок",v:m.p},{l:"жиры",v:m.f},{l:"углев.",v:m.c},{l:"мОсм",v:m.o}].map(x=>`<div class="mix-stat"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('')}</div><div class="indication">${m.i}</div></div>`).join('');
  } else if(S.mixCat==="parenteral"){
    items=PAR.map(m=>`<div class="card mix-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><span style="font-weight:800;font-size:14px">${m.n}</span><span class="brand">${m.b}</span></div><span class="tag" style="background:var(--purple-bg);color:var(--purple)">ПП</span></div><div class="mix-stats" style="grid-template-columns:repeat(4,1fr)">${[{l:"мл",v:m.v},{l:"ккал",v:m.k},{l:"белок г",v:m.p},{l:"мОсм",v:m.o}].map(x=>`<div class="mix-stat"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('')}</div><div style="font-size:12px;font-weight:700;margin-bottom:6px">АК: ${m.aa} · Липиды: ${m.lip} · Глюкоза: ${m.gl}</div><div class="indication">${m.i}</div></div>`).join('');
  } else {
    items=MODD.map(m=>`<div class="card mix-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><span style="font-weight:800;font-size:14px">${m.n}</span><span class="brand">${m.b}</span></div><span class="tag" style="background:var(--green-bg);color:var(--green)">${m.tp}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px"><div style="font-size:12px;font-weight:600"><span style="color:var(--muted)">Состав: </span>${m.ct}</div><div style="font-size:12px;font-weight:600"><span style="color:var(--muted)">Ккал: </span><b style="font-family:var(--mono)">${m.k}</b></div></div><div class="indication">${m.i}</div><div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:800">💊 Дозировка: ${m.d}</div></div>`).join('');
  }
  return `<div class="hdr" style="background:linear-gradient(135deg,#0369A1,#6366F1)"><h2>🧪 Смеси и растворы</h2><p>${ENT.length} ЭП + ${PAR.length} ПП + ${MODD.length} модульных</p></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">${cats.map(c=>`<button class="btn ${S.mixCat===c.id?'btn-primary':'btn-outline'}" onclick="S.mixCat='${c.id}';S.mixFil='all';render()" style="flex:1">${c.l}</button>`).join('')}</div>${items}`;
}

function rMonitoring(){
  const d=S.monDays;
  const nBal=(pr,urea)=>{const nIn=pr/6.25;const nOut=urea*0.466+4;return Math.round((nIn-nOut)*10)/10};
  return `<div class="hdr" style="background:linear-gradient(135deg,#D97706,#059669,#0891B2)"><h2>📊 Мониторинг нутритивной поддержки</h2><p>REE, RQ, покрытие, азотистый баланс</p></div>
    <div class="card" style="overflow-x:auto"><table><thead><tr>${["📅 День","REE","RQ","Дост.","Белок г","Моч.","N-бал","%","Примечание"].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${d.map((r,i)=>{const pct=Math.round((r.del/r.ree)*100);const pc=pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)';const nb=nBal(r.pr,r.urea);const nc=nb>=0?'var(--green)':'var(--red)';
    return `<tr style="background:${i%2?'var(--bg)':'#fff'}"><td style="text-align:center;font-weight:900;font-family:var(--mono);color:var(--accent)">${r.d}</td>
    <td><input type="number" value="${r.ree}" onchange="S.monDays[${i}].ree=+this.value;render()"></td>
    <td><input type="number" value="${r.rq}" step="0.01" onchange="S.monDays[${i}].rq=+this.value;render()"></td>
    <td><input type="number" value="${r.del}" onchange="S.monDays[${i}].del=+this.value;render()"></td>
    <td><input type="number" value="${r.pr}" onchange="S.monDays[${i}].pr=+this.value;render()"></td>
    <td><input type="number" value="${r.urea}" onchange="S.monDays[${i}].urea=+this.value;render()"></td>
    <td style="text-align:center"><span style="color:${nc};font-weight:900;font-family:var(--mono);font-size:14px">${nb>0?'+':''}${nb}</span></td>
    <td style="text-align:center"><span style="color:${pc};font-weight:900;font-size:14px">${pct}%</span></td>
    <td><input type="text" value="${r.no}" onchange="S.monDays[${i}].no=this.value;render()"></td></tr>`}).join('')}</tbody></table></div>
    <button class="btn-ghost" onclick="const l=S.monDays[S.monDays.length-1];S.monDays.push({d:l.d+1,ree:l.ree,rq:l.rq,del:l.del,pr:l.pr,urea:l.urea,no:''});render()">➕ Добавить день</button>
    <div class="grid grid-4" style="margin-top:12px">
      ${metric("📉 Ср.REE",Math.round(d.reduce((s,r)=>s+r.ree,0)/d.length)+" ккал","#6366F1","#EEF2FF")}
      ${metric("🌬️ Ср.RQ",(d.reduce((s,r)=>s+r.rq,0)/d.length).toFixed(2),"#7C3AED","#F5F3FF")}
      ${metric("✅ Покрытие",Math.round(d.reduce((s,r)=>s+(r.del/r.ree)*100,0)/d.length)+"%","#059669","#ECFDF5")}
      ${metric("⚖️ Ср.N-бал",(d.reduce((s,r)=>s+nBal(r.pr,r.urea),0)/d.length).toFixed(1),"#D97706","#FFFBEB")}
    </div>
    <div class="card card-body" style="background:#EEF2FF;border:2px solid #C7D2FE;margin-top:8px"><div style="font-size:13px;color:#3730A3;line-height:1.6;font-weight:700">💡 <b>N-баланс</b> = N_in(белок/6.25) − N_out(мочевина×0.466+4). Цель: +2…+4 г/сут.</div></div>`;
}

function rComplications(){
  const ep=[{n:"🔺 Высокий ост. объём",s:"warning",a:["↓ скорость на 50%","Прокинетики","Головной конец 30–45°","48ч → постпилорический доступ"]},
    {n:"🌊 Диарея",s:"warning",a:["Исключить C.difficile!","↓ скорость","Пептамен / с клетчаткой","Не прекращать ЭП!"]},
    {n:"⚠️ Аспирация",s:"danger",a:["СТОП ЭП","Санация ТБД","Головной конец 45°","Постпилорический зонд"]},
    {n:"📈 Гипергликемия",s:"warning",a:["Диазон","Инсулин: 6–10 ммоль/л","↓ глюкозу в/в"]},
    {n:"🚨 Refeeding",s:"danger",a:["↓↓ калорийность","K,Mg,PO₄ каждые 6–12ч","Тиамин 200–300мг в/в!","10ккал/кг → +33%/сут"]}];
  const pp=[{n:"🦠 Катетерная инфекция",s:"danger",a:["Посев крови","Эмпирическая АБТ","Рассмотреть удаление катетера"]},
    {n:"🫙 Гипертриглицеридемия",s:"warning",a:["↓ скорость липидов",">12 → СТОП липиды","СМОФлипид"]},
    {n:"🏥 Холестаз",s:"warning",a:["↓ липиды до 1 г/кг","СМОФлипид/Омегавен","Циклическое ПП"]},
    {n:"📈 Гипергликемия на ПП",s:"warning",a:["↓ глюкозу (max 4–5 г/кг/сут)","Инсулин в/в"]},
    {n:"💧 Перегрузка жидкостью",s:"warning",a:["Концентрированные р-ры","↑ ЭП, ↓ ПП"]}];
  const data=S.complView==="ep"?ep:pp;
  return `<div class="hdr" style="background:linear-gradient(135deg,#DC2626,#EA580C)"><h2>⚠️ Осложнения НП</h2><p>Алгоритмы действий при осложнениях</p></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">${[{id:"ep",l:"🥤 Осложнения ЭП"},{id:"pp",l:"💉 Осложнения ПП"}].map(c=>`<button class="btn ${S.complView===c.id?'btn-primary':'btn-outline'}" onclick="S.complView='${c.id}';render()" style="flex:1">${c.l}</button>`).join('')}</div>
    ${data.map(c=>`<div class="card compl-card" style="border-left:5px solid ${c.s==='danger'?'var(--red)':'var(--yellow)'};background:${c.s==='danger'?'#FFF5F5':'#FFFDF0'}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h4>${c.n}</h4><span class="tag" style="background:${c.s==='danger'?'#FEE2E2':'#FEF3C7'};color:${c.s==='danger'?'var(--red)':'var(--yellow)'}">${c.s==='danger'?'🚨 Критическое':'⚠️ Внимание'}</span></div>${c.a.map((a,j)=>`<div class="step"><span class="num" style="color:${c.s==='danger'?'var(--red)':'var(--yellow)'}">${j+1}.</span>${a}</div>`).join('')}</div>`).join('')}`;
}

function rReference(){
  const sec=[
    {t:"🌬️ RQ — интерпретация",it:[{l:"<0.70",d:"Кетогенез"},{l:"0.70–0.85",d:"Смешанное (норма)"},{l:"0.85–1.0",d:"Углеводы"},{l:">1.0",d:"Липогенез!"}]},
    {t:"📊 MI — метаболич. индекс",it:[{l:"<0.9",d:"Гипометаболизм"},{l:"0.9–1.1",d:"Нормо"},{l:"1.1–1.3",d:"Гипер"},{l:">1.3",d:"Выраж.гипер"}]},
    {t:"🩸 Лактат",it:[{l:"<2",d:"Норма"},{l:"2–4",d:"Гипоперфузия"},{l:">4",d:"Тяжёлая гипоксия!"}]},
    {t:"⏱️ Фазы критического состояния",it:[{l:"Ebb (0–48ч)",d:"Гипометаб., трофич. ЭП ≤70% REE"},{l:"Flow (>48ч)",d:"Гиперметаб., до 100% REE"}]},
    {t:"⚖️ ИМТ-коррекция веса",it:[{l:"ИМТ<30",d:"По фактическому весу"},{l:"ИМТ 30–50",d:"Энергия по скорр., белок по идеальному"},{l:"ИМТ>50",d:"По идеальному весу"}]},
    {t:"🧪 N-баланс",it:[{l:"Формула",d:"N_in − N_out(моч×0.466+4)"},{l:"Цель",d:"+2…+4 г/сут"},{l:"Отрицат.",d:"↑ белковую дотацию"}]},
    {t:"📚 ESPEN/ASPEN рекомендации",it:[{l:"ЭП",d:"24–48ч, старт"},{l:"Белок",d:"≥1.3 г/кг"},{l:"ПП",d:"Не ранее 3–7 дня"},{l:"Глутамин",d:"0.3–0.5г/кг (не при ПОН!)"},{l:"ω-3",d:"При ОРДС, сепсисе"}]},
    {t:"📖 Источники",it:[{l:"ESPEN 2019",d:"Singer et al. Clin Nutr"},{l:"ESPEN 2023",d:"Update"},{l:"ASPEN 2022",d:"Compher et al. JPEN"},{l:"EFFORT",d:"Heyland, Lancet 2023"},{l:"NICE 2006",d:"Refeeding guidelines"}]}
  ];
  const colors=["#6366F1","#0891B2","#DC2626","#D97706","#059669","#7C3AED","#0369A1","#64748B"];
  return `<div class="hdr" style="background:linear-gradient(135deg,#4338CA,#6366F1,#8B5CF6)"><h2>📖 Справочник</h2><p>Ключевые данные и нормативы</p></div>
    ${sec.map((s,si)=>`<div class="card card-body" style="border-left:4px solid ${colors[si]}"><div style="font-size:14px;font-weight:900;margin-bottom:10px;color:${colors[si]}">${s.t}</div>${s.it.map((x,i)=>`<div style="display:flex;gap:12px;padding:8px 0;${i<s.it.length-1?'border-bottom:1px solid var(--border)':''}"><div style="font-weight:800;color:${colors[si]};min-width:80px;font-size:12px;font-family:var(--mono)">${x.l}</div><div style="font-size:13px;color:var(--text);font-weight:600">${x.d}</div></div>`).join('')}</div>`).join('')}`;
}

render();
</script>
</body>
</html>
